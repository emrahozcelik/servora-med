name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  server:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: servora_med_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d servora_med_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/servora_med_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/servora_med_test
      NODE_ENV: test
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: bash -n ../ops/scripts/backup-postgres.sh ../ops/scripts/restore-rehearsal.sh
      - name: shellcheck ops scripts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          shellcheck -x ../ops/scripts/backup-postgres.sh ../ops/scripts/restore-rehearsal.sh
      - name: systemd-analyze verify units
        run: |
          if command -v systemd-analyze >/dev/null 2>&1; then
            systemd-analyze verify ../ops/systemd/servora-med.service \
              ../ops/systemd/servora-med-backup.service \
              ../ops/systemd/servora-med-backup.timer
          else
            echo "systemd-analyze not available; skipping unit verify"
          fi
      - name: caddy validate (optional)
        run: |
          if command -v caddy >/dev/null 2>&1; then
            caddy validate --config ../ops/caddy/Caddyfile.example --adapter caddyfile
          else
            echo "caddy not installed on runner; skipping Caddyfile validate"
          fi
      - run: npm ci
      - run: npm run build
      - run: npx tsx src/db/migrate.ts
      - run: npm test -- --run
      - run: npm audit --audit-level=high

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test -- --run
      - run: npm audit --audit-level=high
