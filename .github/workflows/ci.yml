name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  server:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: servora_med_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d servora_med_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/servora_med_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/servora_med_test
      NODE_ENV: test
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: |
          bash -n \
            ../ops/scripts/backup-postgres.sh \
            ../ops/scripts/restore-rehearsal.sh \
            ../ops/scripts/deploy-release.sh \
            ../ops/scripts/ensure-macos-service-identity.sh \
            ../ops/ci/verify-caddyfile.sh \
            ../ops/ci/verify-sse-streaming.sh \
            ../ops/ci/verify-tunnel-caddyfile.sh \
            ../ops/ci/verify-tunnel-caddy-behavior.sh \
            ../ops/ci/verify-cloudflared-ingress.sh \
            ../ops/ci/verify-db-auth-contract.sh \
            ../ops/ci/verify-systemd-units.sh \
            ../ops/launchd/start-api.sh.example \
            ../ops/launchd/run-backup.sh.example
      - name: shellcheck ops scripts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          shellcheck -x \
            ../ops/scripts/backup-postgres.sh \
            ../ops/scripts/restore-rehearsal.sh \
            ../ops/scripts/deploy-release.sh \
            ../ops/scripts/ensure-macos-service-identity.sh \
            ../ops/ci/verify-caddyfile.sh \
            ../ops/ci/verify-sse-streaming.sh \
            ../ops/ci/verify-tunnel-caddyfile.sh \
            ../ops/ci/verify-tunnel-caddy-behavior.sh \
            ../ops/ci/verify-cloudflared-ingress.sh \
            ../ops/ci/verify-db-auth-contract.sh \
            ../ops/ci/verify-systemd-units.sh \
            ../ops/launchd/start-api.sh.example \
            ../ops/launchd/run-backup.sh.example
      - name: systemd-analyze verify units
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq systemd
          bash ../ops/ci/verify-systemd-units.sh
      - name: caddy validate Caddyfile (VPS)
        run: bash ../ops/ci/verify-caddyfile.sh
      - name: caddy validate Caddyfile (tunnel pilot)
        run: bash ../ops/ci/verify-tunnel-caddyfile.sh
      - name: caddy tunnel behavior smoke
        run: bash ../ops/ci/verify-tunnel-caddy-behavior.sh
      - name: cloudflared ingress validate
        run: bash ../ops/ci/verify-cloudflared-ingress.sh
      - name: Install PostgreSQL 17 client tools
        run: |
          set -Eeuo pipefail
          # Match service container major (postgres:17) for pg_dump/pg_restore.
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl ca-certificates gnupg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"
          /usr/lib/postgresql/17/bin/pg_dump --version
          /usr/lib/postgresql/17/bin/pg_restore --version
      - name: password-bearing DATABASE_URL auth contract
        run: bash ../ops/ci/verify-db-auth-contract.sh
        env:
          PSQL_BIN: /usr/lib/postgresql/17/bin/psql
      - run: npm ci
      - run: npm run build
      - name: production release dependency smoke
        run: |
          set -Eeuo pipefail
          SMOKE="$(mktemp -d)"
          cp -R dist package.json package-lock.json "$SMOKE/"
          cd "$SMOKE"
          npm ci --omit=dev
          test -d node_modules/fastify
          test -d node_modules/pg
          node --input-type=module -e "import 'fastify'; import 'pg'; console.log('deps-ok')"
          test -f dist/index.js
          test -f dist/db/migrate.js
      - run: npx tsx src/db/migrate.ts
      - run: npm test -- --run
        env:
          PG_DUMP_BIN: /usr/lib/postgresql/17/bin/pg_dump
          PG_RESTORE_BIN: /usr/lib/postgresql/17/bin/pg_restore
          PSQL_BIN: /usr/lib/postgresql/17/bin/psql
      - run: npm audit --audit-level=high

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run bundle:check
      - run: npm test -- --run
      - run: npx playwright install --with-deps chromium
      - run: npm run smoke:responsive
      - run: npm audit --audit-level=high
